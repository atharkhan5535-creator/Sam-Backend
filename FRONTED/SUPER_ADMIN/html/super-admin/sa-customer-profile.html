<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer List - sam.com</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* All your CSS remains exactly as you had it */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: #ffffff; padding-top: 135px; color: #111; }
        .master-header { position: fixed; top: 0; left: 0; width: 100%; height: 95px; background: #fcfcfc; border-bottom: 2px solid #e0e0e0; box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05); z-index: 1000; display: flex; justify-content: center; }
        .header-container { width: 100%; max-width: 1440px; display: flex; justify-content: space-between; align-items: center; padding: 0 60px; }
        .logo-group { display: flex; align-items: center; gap: 12px; text-decoration: none; }
        .logo-text { color: #6c5ce7; font-size: 34px; font-weight: 900; letter-spacing: -2px; }
        .nav-links { display: flex; list-style: none; gap: 45px; }
        .nav-links a { text-decoration: none; color: #111; font-size: 18px; font-weight: 800; }
        .nav-links a.active { color: #6c5ce7 !important; }
        .main-content { padding: 0 60px; max-width: 1440px; margin: 0 auto; }
        .list-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .list-header h1 { font-size: 32px; font-weight: 900; letter-spacing: -1px; }
        .controls { display: flex; gap: 15px; align-items: center; }
        .search-box { position: relative; }
        .search-box i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #9ca3af; }
        .search-box input { padding: 12px 15px 12px 45px; border-radius: 12px; border: 1px solid #e5e7eb; width: 300px; font-weight: 600; outline: none; }
        .btn-add { background: #6c5ce7; color: white; border: none; padding: 12px 25px; border-radius: 12px; font-weight: 800; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        .master-card { background: white; border-radius: 20px; border: 1px solid #eee; box-shadow: 0 5px 20px rgba(0,0,0,0.03); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 20px 25px; background: #fafafa; color: #6b7280; font-size: 13px; font-weight: 800; text-transform: uppercase; border-bottom: 1px solid #eee; }
        td { padding: 20px 25px; font-size: 15px; font-weight: 600; border-bottom: 1px solid #f8f8f8; color: #333; }
        .customer-info { display: flex; align-items: center; gap: 12px; }
        .avatar-sm { width: 35px; height: 35px; background: #f0edff; color: #6c5ce7; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 800; }
        .action-link { color: #6c5ce7; text-decoration: none; font-weight: 800; display: inline-block; cursor: pointer; }
        .action-link:hover { text-decoration: underline; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.6); display: none; justify-content: center; align-items: center; z-index: 2000; }
        .modal-content { background: white; width: 550px; border-radius: 20px; padding: 40px; box-shadow: 0 20px 50px rgba(0,0,0,0.2); }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .form-group { display: flex; flex-direction: column; gap: 8px; }
        .form-group label { font-size: 11px; font-weight: 800; color: #9ca3af; text-transform: uppercase; }
        .form-group input { padding: 12px; border-radius: 10px; border: 1px solid #e5e7eb; font-weight: 600; }
        .btn-primary { background: #6c5ce7; color: white; border: none; padding: 12px 25px; border-radius: 12px; font-weight: 800; cursor: pointer; }
        .btn-secondary { background: #f3f4f6; color: #111; border: none; padding: 12px 25px; border-radius: 12px; font-weight: 800; cursor: pointer; }
    </style>
</head>
<body>

    <header class="master-header">
        <div class="header-container">
            <a href="sa-dashboard.html" class="logo-group">
                <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="#6c5ce7" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="6" cy="6" r="3"></circle><circle cx="6" cy="18" r="3"></circle>
                    <line x1="20" y1="4" x2="8.12" y2="15.88"></line><line x1="14.47" y1="14.48" x2="20" y2="20"></line>
                    <line x1="8.12" y1="8.12" x2="12" y2="12"></line>
                </svg>
                <span class="logo-text">sam.com</span>
            </a>
            <nav>
                <ul class="nav-links">
                    <li><a href="sa-dashboard.html">Dashboard</a></li>
                    <li><a href="sa-subscription.html">Subscription</a></li>
                    <li><a href="sa-invoices.html">Invoices</a></li>
                    <li><a href="sa-salons.html">Salons</a></li>
                    <li><a href="sa-users.html">Users</a></li>
                    <li><a href="sa-customer-profile.html" class="active">Customer</a></li>
                    <li><a href="javascript:void(0);" class="logout-link" id="logoutBtn">Log out</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="main-content">
        <div class="list-header">
            <h1>Customer List</h1>
            <div class="controls">
                <div class="search-box">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="customerSearch" placeholder="Search customers...">
                </div>
                <button class="btn-add">
                    <i class="fa-solid fa-plus"></i> Add Customer
                </button>
            </div>
        </div>

        <div id="addCustomerModal" class="modal-overlay">
            <div class="modal-content">
                <h2>Add New Customer</h2>
                <form id="addCustomerForm">
                    <div class="form-grid">
                        <div class="form-group" style="grid-column: span 2;">
                            <label>Full Name</label>
                            <input type="text" placeholder="Jessica Anderson" required>
                        </div>
                        <div class="form-group" style="grid-column: span 2;">
                            <label>Email Address</label>
                            <input type="email" placeholder="jessica.a@email.com" required>
                        </div>
                    </div>
                    <div style="display: flex; justify-content: flex-end; gap: 12px; margin-top: 25px;">
                        <button type="button" class="btn-secondary" onclick="closeModal()">Cancel</button>
                        <button type="submit" class="btn-primary">Save Customer</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="master-card">
            <table>
                <thead>
                    <tr>
                        <th>Customer Name</th>
                        <th>Email</th>
                        <th>Phone</th>
                        <th>Total Visits</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="customerTableBody">
                    <tr>
                        <td>
                            <div class="customer-info">
                                <div class="avatar-sm">JA</div>
                                <span>Jessica Anderson</span>
                            </div>
                        </td>
                        <td>jessica.a@email.com</td>
                        <td>+1 (555) 123-4567</td>
                        <td>24 Visits</td>
                        <td>
                            <a href="sa-customer-profile.html" class="action-link">View Profile</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>
    <script src="../../Js/Core/config.js"></script>
    <script src="../../Js/Core/api.js"></script>
    <script src="../../Js/pages/sa-customer-profile.js"></script>
</body>
</html>
