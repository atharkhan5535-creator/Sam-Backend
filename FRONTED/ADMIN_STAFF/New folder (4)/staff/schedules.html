<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Schedule - Elite Salon Staff</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" href="../css/toastify.min.css">
    <link rel="stylesheet" href="../css/main.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--primary-dark); color: var(--text-primary); }
        .dashboard-wrapper { display: flex; min-height: 100vh; }
        .sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: 220px; background: linear-gradient(180deg, var(--primary-darker) 0%, var(--secondary-dark) 100%); border-right: 1px solid var(--card-border); display: flex; flex-direction: column; z-index: 1000; }
        .sidebar-header { padding: 1rem; border-bottom: 1px solid var(--card-border); }
        .sidebar-logo { font-size: 1.1rem; font-weight: 700; color: var(--text-primary); text-transform: uppercase; }
        .sidebar-logo::before { content: '✂️'; font-size: 1.25rem; margin-right: 0.4rem; }
        .sidebar-user { margin-top: 0.75rem; padding: 0.6rem; background: var(--card-bg); border-radius: 6px; border: 1px solid var(--card-border); }
        .sidebar-user-info { display: flex; align-items: center; gap: 0.5rem; }
        .user-avatar { width: 32px; height: 32px; border-radius: 6px; background: linear-gradient(135deg, var(--accent-gold), var(--accent-bronze)); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.85rem; color: var(--primary-dark); flex-shrink: 0; }
        .user-details { flex: 1; min-width: 0; }
        .user-name { font-weight: 600; font-size: 0.75rem; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .user-role { font-size: 0.6rem; color: var(--text-secondary); text-transform: uppercase; }
        .sidebar-nav { padding: 0.75rem 0.5rem; flex: 1; overflow-y: auto; }
        .nav-section-title { font-size: 0.6rem; font-weight: 700; text-transform: uppercase; color: var(--text-muted); margin-bottom: 0.5rem; padding-left: 0.5rem; }
        .nav-item { display: flex; align-items: center; gap: 0.6rem; padding: 0.6rem 0.65rem; margin-bottom: 0.2rem; border-radius: 6px; color: var(--text-secondary); text-decoration: none; transition: all 0.2s; font-weight: 500; font-size: 0.8rem; }
        .nav-item:hover { background: rgba(212, 175, 55, 0.05); color: var(--text-primary); transform: translateX(3px); }
        .nav-item.active { background: rgba(212, 175, 55, 0.1); border: 1px solid rgba(212, 175, 55, 0.3); color: var(--accent-gold); }
        .nav-item i { width: 16px; text-align: center; font-size: 0.9rem; }
        .sidebar-footer { padding: 0.75rem; border-top: 1px solid var(--card-border); }
        .logout-btn { display: flex; align-items: center; justify-content: center; gap: 0.5rem; width: 100%; padding: 0.65rem; background: linear-gradient(135deg, var(--danger), #dc2626); color: white; border: none; border-radius: 6px; font-weight: 600; font-size: 0.8rem; cursor: pointer; transition: all 0.2s; }
        .logout-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 15px rgba(239, 68, 68, 0.4); }
        .main-content { margin-left: 220px; flex: 1; display: flex; flex-direction: column; min-height: 100vh; }
        .dashboard-header { display: flex; justify-content: space-between; align-items: center; padding: 0.5rem 1rem; background: rgba(10, 14, 26, 0.95); border-bottom: 1px solid var(--card-border); height: 45px; flex-shrink: 0; }
        .page-title-mini { display: flex; align-items: center; gap: 0.5rem; }
        .page-icon-mini { width: 28px; height: 28px; background: linear-gradient(135deg, var(--accent-gold), var(--accent-bronze)); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 0.9rem; color: var(--primary-dark); }
        .page-title-mini h1 { font-size: 0.9rem; font-weight: 700; }
        .page-title-mini p { font-size: 0.6rem; color: var(--text-secondary); }
        .dashboard-main { flex: 1; padding: 0.5rem; overflow-y: auto; display: flex; flex-direction: column; gap: 0.5rem; }
        .content-card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 6px; padding: 0.5rem; display: flex; flex-direction: column; }
        .card-header-mini { display: flex; justify-content: space-between; align-items: center; padding: 0.5rem 0.75rem; border-bottom: 1px solid var(--card-border); }
        .card-title-mini { display: flex; align-items: center; gap: 0.4rem; font-size: 0.7rem; font-weight: 600; color: var(--text-primary); }
        .card-title-mini i { color: var(--accent-gold); font-size: 0.75rem; }
        .card-body-mini { padding: 0.5rem; flex: 1; }
        .timeline { display: flex; flex-direction: column; gap: 0.5rem; }
        .timeline-item { display: flex; gap: 0.75rem; padding: 0.75rem; background: rgba(255, 255, 255, 0.02); border-radius: var(--radius-lg); border-left: 3px solid var(--accent-gold); }
        .timeline-time { min-width: 70px; font-size: 0.7rem; font-weight: 600; color: var(--accent-gold); }
        .timeline-content { flex: 1; }
        .timeline-title { font-size: 0.8rem; font-weight: 600; color: var(--text-primary); margin-bottom: 0.25rem; }
        .timeline-desc { font-size: 0.7rem; color: var(--text-secondary); }
        .btn { display: inline-flex; align-items: center; justify-content: center; gap: 0.35rem; padding: 0.4rem 0.65rem; font-family: inherit; font-size: 0.65rem; font-weight: 600; text-transform: uppercase; border: none; border-radius: 4px; cursor: pointer; transition: all 0.2s; text-decoration: none; }
        .btn-primary { background: linear-gradient(135deg, var(--accent-gold), var(--accent-bronze)); color: var(--primary-dark); }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(212, 175, 55, 0.4); }
        .btn-secondary { background: var(--card-bg); color: var(--text-primary); border: 1px solid var(--card-border); }
        .btn-secondary:hover { background: var(--secondary-dark); border-color: var(--accent-gold); }
        .btn-sm { padding: 0.3rem 0.5rem; font-size: 0.6rem; }
        .form-select { padding: 0.5rem 0.6rem; background: var(--primary-dark); border: 1px solid var(--card-border); border-radius: 4px; color: var(--text-primary); font-size: 0.75rem; font-family: inherit; }
        .loading-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem 1rem; }
        .loading-spinner { width: 28px; height: 28px; border: 2px solid var(--card-border); border-top-color: var(--accent-gold); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 0.5rem; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { color: var(--text-secondary); font-size: 0.7rem; }
        .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 1.5rem 1rem; text-align: center; }
        .empty-icon { width: 40px; height: 40px; background: rgba(212, 175, 55, 0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1rem; color: var(--accent-gold); margin-bottom: 0.5rem; }
        .empty-title { font-size: 0.8rem; font-weight: 600; color: var(--text-primary); margin-bottom: 0.25rem; }
        .empty-text { color: var(--text-secondary); font-size: 0.7rem; }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: var(--primary-dark); }
        ::-webkit-scrollbar-thumb { background: var(--card-border); border-radius: 2px; }
        @media (max-width: 768px) { .sidebar { transform: translateX(-100%); transition: transform 0.3s; } .sidebar.open { transform: translateX(0); } .main-content { margin-left: 0; } }
    </style>
</head>
<body>
    <div class="dashboard-wrapper">
        <aside class="sidebar">
            <div class="sidebar-header"><div class="sidebar-logo">Elite Salon</div>
                <div class="sidebar-user"><div class="sidebar-user-info"><div class="user-avatar" id="userAvatar">S</div><div class="user-details"><div class="user-name" id="userName">Staff</div><div class="user-role" id="userRole">Staff</div></div></div></div>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-section"><div class="nav-section-title">Main Menu</div>
                    <a href="dashboard.html" class="nav-item"><i class="fas fa-chart-line"></i><span>Dashboard</span></a>
                    <a href="appointments.html" class="nav-item"><i class="fas fa-calendar-check"></i><span>Appointments</span></a>
                    <a href="customers.html" class="nav-item"><i class="fas fa-users"></i><span>Customers</span></a>
                </div>
                <div class="nav-section"><div class="nav-section-title">Services</div>
                    <a href="services.html" class="nav-item"><i class="fas fa-cut"></i><span>Services</span></a>
                    <a href="package.html" class="nav-item"><i class="fas fa-gift"></i><span>Packages</span></a>
                    <a href="inventory.html" class="nav-item"><i class="fas fa-boxes"></i><span>Inventory</span></a>
                </div>
                <div class="nav-section"><div class="nav-section-title">My</div>
                    <a href="schedules.html" class="nav-item active"><i class="fas fa-calendar-alt"></i><span>My Schedule</span></a>
                    <a href="profile.html" class="nav-item"><i class="fas fa-user"></i><span>Profile</span></a>
                    <a href="my-incentives.html" class="nav-item"><i class="fas fa-trophy"></i><span>My Incentives</span></a>
                </div>
            </nav>
            <div class="sidebar-footer"><button class="logout-btn" onclick="handleLogout()"><i class="fas fa-sign-out-alt"></i><span>Logout</span></button></div>
        </aside>
        <main class="main-content">
            <header class="dashboard-header">
                <div class="page-title-mini"><div class="page-icon-mini"><i class="fas fa-calendar-alt"></i></div><div><h1>My Schedule</h1><p>View your appointments</p></div></div>
                <div style="display:flex;gap:0.5rem;">
                    <input type="date" id="filterDate" class="form-select" style="font-size:0.7rem;" onchange="loadMySchedule()">
                    <button class="btn btn-secondary btn-sm" onclick="loadMySchedule()"><i class="fas fa-sync-alt"></i> Refresh</button>
                </div>
            </header>
            <div class="dashboard-main">
                <div id="loadingState" class="loading-state"><div class="loading-spinner"></div><p class="loading-text">Loading schedule...</p></div>
                <div class="content-card" id="scheduleContent" style="display:none;">
                    <div class="card-header-mini"><div class="card-title-mini"><i class="fas fa-calendar-day"></i><span>Today's Appointments</span></div></div>
                    <div class="card-body-mini">
                        <div class="timeline" id="scheduleTimeline"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="../js/sweetalert2.min.js"></script>
    <script src="../js/toastify.min.js"></script>
    <script src="../js/notifications.js"></script>
    <script src="../js/core-api.js"></script>
    <script src="../js/auth-api.js"></script>
    <script src="../js/appointments-api.js"></script>
    <script>
        let myAppointments = [];
        document.addEventListener('DOMContentLoaded', function() {
            if (!TokenManager.isAuthenticated()) { window.location.href = '../login.html'; return; }
            const user = TokenManager.getUser();
            if (!user || user.role !== USER_ROLES.STAFF) { window.location.href = '../index.html'; return; }
            updateUserInfo(user);
            document.getElementById('filterDate').valueAsDate = new Date();
            loadMySchedule();
        });
        function updateUserInfo(user) {
            document.getElementById('userName').textContent = user.username || user.name || 'User';
            document.getElementById('userRole').textContent = user.role || 'User';
            document.getElementById('userAvatar').textContent = (user.username || user.name || 'U')[0].toUpperCase();
        }
        async function loadMySchedule() {
            document.getElementById('loadingState').style.display = 'flex';
            document.getElementById('scheduleContent').style.display = 'none';
            try {
                const params = {};
                const date = document.getElementById('filterDate').value;
                if (date) params.date = date;
                const result = await AppointmentsAPI.list(params);
                if (result.success) {
                    const user = TokenManager.getUser();
                    myAppointments = (result.data.items || []).filter(appt => {
                        const services = appt.services || [];
                        return services.some(s => s.staff_id == user.id);
                    });
                    renderSchedule();
                } else { showErrorToast(result.message || 'Failed to load'); }
            } catch (error) { console.error('Error:', error); showErrorToast('Failed: ' + error.message); }
            finally { document.getElementById('loadingState').style.display = 'none'; document.getElementById('scheduleContent').style.display = 'flex'; }
        }
        function renderSchedule() {
            const container = document.getElementById('scheduleTimeline');
            if (myAppointments.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="empty-icon"><i class="fas fa-calendar-times"></i></div><h3 class="empty-title">No Appointments</h3><p class="empty-text">You have no appointments for this date</p></div>';
                return;
            }
            container.innerHTML = myAppointments.sort((a, b) => (a.start_time || '').localeCompare(b.start_time || '')).map(appt => {
                const services = (appt.services || []).filter(s => s.staff_id == TokenManager.getUser().id);
                const serviceNames = services.map(s => s.service_name).join(', ');
                const customerName = appt.customer_name || 'Unknown';
                const status = appt.status || 'PENDING';
                const statusColor = status === 'COMPLETED' ? 'var(--success)' : status === 'CANCELLED' ? 'var(--danger)' : 'var(--accent-gold)';
                return '<div class="timeline-item">' +
                    '<div class="timeline-time">' + (appt.start_time ? appt.start_time.substring(0, 5) : '-') + '</div>' +
                    '<div class="timeline-content">' +
                    '<div class="timeline-title">' + customerName + ' <span style="color:' + statusColor + ';font-size:0.65rem;">(' + status + ')</span></div>' +
                    '<div class="timeline-desc">' + (serviceNames || 'Service') + '</div>' +
                    '<div class="timeline-desc" style="margin-top:0.25rem;"><i class="fas fa-user"></i> ' + customerName + '</div>' +
                    '</div>' +
                    '</div>';
            }).join('');
        }
        async function handleLogout() { if (confirm('Are you sure?')) { await AuthAPI.logout(); TokenManager.removeToken(); TokenManager.removeUser(); localStorage.removeItem('refresh_token'); window.location.href = '../index.html'; } }
    </script>
</body>
</html>
