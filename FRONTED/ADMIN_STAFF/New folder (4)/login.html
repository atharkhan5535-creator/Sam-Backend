<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Elite Salon Management System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
    <!-- Toastify CSS - LOCAL FILE -->
    <link rel="stylesheet" href="css/toastify.min.css">
    <link rel="stylesheet" href="css/main.css">
    <style>
        :root {
            --primary-dark: #0a0e1a;
            --primary-darker: #050810;
            --secondary-dark: #111827;
            --card-bg: #1a1f2e;
            --card-border: #2a3142;
            --accent-gold: #d4af37;
            --accent-gold-light: #f4cf57;
            --accent-bronze: #cd7f32;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --info: #3b82f6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary-darker) 100%);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            top: -30%;
            right: -10%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.08) 0%, transparent 70%);
            border-radius: 50%;
            animation: pulse 8s ease-in-out infinite;
        }

        body::after {
            content: '';
            position: absolute;
            bottom: -20%;
            left: -5%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(205, 127, 50, 0.06) 0%, transparent 70%);
            border-radius: 50%;
            animation: pulse 10s ease-in-out infinite reverse;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }

        .login-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 1000px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0;
            background: linear-gradient(135deg, var(--card-bg) 0%, var(--secondary-dark) 100%);
            border: 1px solid var(--card-border);
            border-radius: var(--radius-xl);
            overflow: hidden;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.5);
        }

        /* Left Side - Branding */
        .login-branding {
            padding: 3rem;
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.1) 0%, transparent 100%);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
        }

        .login-branding::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -20%;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }

        .brand-header {
            position: relative;
            z-index: 10;
        }

        .brand-logo {
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.5rem 1rem;
            background: rgba(212, 175, 55, 0.15);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: var(--radius-full);
            margin-bottom: 2rem;
        }

        .brand-logo i {
            color: var(--accent-gold);
            font-size: 1.25rem;
        }

        .brand-logo span {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--accent-gold);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .brand-title {
            font-size: 2.5rem;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, var(--text-primary) 0%, var(--accent-gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .brand-tagline {
            font-size: 1.1rem;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        .brand-features {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .brand-feature {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--card-border);
            border-radius: var(--radius-lg);
        }

        .brand-feature i {
            color: var(--accent-gold);
            font-size: 1.1rem;
        }

        .brand-feature span {
            font-size: 0.95rem;
            color: var(--text-primary);
            font-weight: 500;
        }

        .scissor-decoration {
            position: absolute;
            bottom: 2rem;
            right: 2rem;
            font-size: 8rem;
            opacity: 0.05;
            color: var(--accent-gold);
            transform: rotate(-15deg);
        }

        /* Right Side - Login Form */
        .login-form-container {
            padding: 3rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .form-header {
            margin-bottom: 2rem;
        }

        .form-header h2 {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }

        .form-header p {
            font-size: 1rem;
            color: var(--text-secondary);
        }

        .alert-box {
            padding: 1rem;
            border-radius: var(--radius-lg);
            margin-bottom: 1.5rem;
            display: none;
            align-items: center;
            gap: 0.75rem;
            font-size: 0.9rem;
            animation: slideDown 0.3s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .alert-box.show {
            display: flex;
        }

        .alert-box.error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: var(--danger);
        }

        .alert-box.success {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: var(--success);
        }

        .demo-credentials {
            background: rgba(212, 175, 55, 0.05);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            margin-bottom: 2rem;
        }

        .demo-credentials h4 {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--accent-gold);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .demo-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem;
            background: rgba(255, 255, 255, 0.02);
            border-radius: var(--radius-md);
            margin-bottom: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .demo-item:hover {
            background: rgba(212, 175, 55, 0.08);
            border-color: rgba(212, 175, 55, 0.3);
            transform: translateX(5px);
        }

        .demo-item:last-child {
            margin-bottom: 0;
        }

        .demo-item i {
            font-size: 1.1rem;
            color: var(--accent-gold);
        }

        .demo-item strong {
            color: var(--text-primary);
            font-weight: 600;
        }

        .demo-item span {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .role-badge {
            margin-left: auto;
            padding: 0.25rem 0.75rem;
            border-radius: var(--radius-full);
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .role-badge.admin {
            background: rgba(59, 130, 246, 0.2);
            color: var(--info);
            border: 1px solid rgba(59, 130, 246, 0.3);
        }

        .role-badge.staff {
            background: rgba(16, 185, 129, 0.2);
            color: var(--success);
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-group label {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-input-wrapper {
            position: relative;
        }

        .form-input-wrapper i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 1.1rem;
            transition: color 0.2s;
        }

        .form-input {
            width: 100%;
            padding: 1rem 1rem 1rem 3rem;
            background: var(--primary-dark);
            border: 1px solid var(--card-border);
            border-radius: var(--radius-lg);
            color: var(--text-primary);
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.2s;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent-gold);
            box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.1);
        }

        .form-input:focus + i {
            color: var(--accent-gold);
        }

        .btn-login {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            padding: 1rem 2rem;
            background: linear-gradient(135deg, var(--accent-gold) 0%, var(--accent-bronze) 100%);
            color: var(--primary-dark);
            border: none;
            border-radius: var(--radius-lg);
            font-family: inherit;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-login:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(212, 175, 55, 0.4);
        }

        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .back-link {
            text-align: center;
            margin-top: 1rem;
        }

        .back-link a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            transition: color 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .back-link a:hover {
            color: var(--accent-gold);
        }

        /* Responsive Design */
        @media (max-width: 900px) {
            .login-wrapper {
                grid-template-columns: 1fr;
                max-width: 500px;
            }

            .login-branding {
                padding: 2rem;
                min-height: auto;
            }

            .brand-features {
                display: none;
            }

            .scissor-decoration {
                display: none;
            }

            .login-form-container {
                padding: 2rem;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 1rem;
            }

            .login-form-container {
                padding: 1.5rem;
            }

            .form-header h2 {
                font-size: 1.5rem;
            }

            .demo-credentials {
                padding: 1rem;
            }

            .demo-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.5rem;
            }

            .role-badge {
                margin-left: 0;
            }
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <!-- Left Side - Branding -->
        <div class="login-branding">
            <div class="brand-header">
                <div class="brand-logo">
                    <i class="fas fa-crown"></i>
                    <span>Premium Solution</span>
                </div>
                <h1 class="brand-title">Elite Salon Management</h1>
                <p class="brand-tagline">
                    Streamline your salon operations with our professional management platform.
                </p>
            </div>

            <div class="brand-features">
                <div class="brand-feature">
                    <i class="fas fa-calendar-check"></i>
                    <span>Smart Scheduling</span>
                </div>
                <div class="brand-feature">
                    <i class="fas fa-chart-line"></i>
                    <span>Business Analytics</span>
                </div>
                <div class="brand-feature">
                    <i class="fas fa-users"></i>
                    <span>Staff Management</span>
                </div>
                <div class="brand-feature">
                    <i class="fas fa-credit-card"></i>
                    <span>Payments & Invoices</span>
                </div>
            </div>

            <i class="fas fa-cut scissor-decoration"></i>
        </div>

        <!-- Right Side - Login Form -->
        <div class="login-form-container">
            <div class="form-header">
                <h2>Welcome Back!</h2>
                <p>Sign in to access your dashboard</p>
            </div>

            <div id="alertBox" class="alert-box"></div>

            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="email"><i class="fas fa-envelope"></i> Email Address</label>
                    <div class="form-input-wrapper">
                        <input type="email" id="email" class="form-input" placeholder="Enter your email" required>
                        <i class="fas fa-envelope"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label for="salonId"><i class="fas fa-building"></i> Salon ID</label>
                    <div class="form-input-wrapper">
                        <input type="number" id="salonId" class="form-input" placeholder="Enter your Salon ID" required>
                        <i class="fas fa-building"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password"><i class="fas fa-lock"></i> Password</label>
                    <div class="form-input-wrapper">
                        <input type="password" id="password" class="form-input" placeholder="Enter your password" required>
                        <i class="fas fa-lock"></i>
                    </div>
                </div>

                <button type="submit" class="btn-login" id="loginBtn">
                    <span id="loginBtnText"><i class="fas fa-sign-in-alt"></i> Sign In</span>
                    <span id="loginSpinner" style="display:none;"><i class="fas fa-circle-notch fa-spin"></i> Signing in...</span>
                </button>

                <div class="back-link">
                    <a href="index.html">
                        <i class="fas fa-arrow-left"></i>
                        Back to Home
                    </a>
                </div>
            </form>
        </div>
    </div>

    <!-- Load libraries in correct order: dependencies first, then our code -->
    <!-- 1. SweetAlert2 (for modal alerts) - LOCAL FILE -->
    <script src="js/sweetalert2.min.js"></script>
    <!-- 2. Toastify JS (for toast notifications) - LOCAL FILE -->
    <script src="js/toastify.min.js"></script>
    <!-- 3. Our notifications wrapper (uses SweetAlert2 and Toastify) - LOCAL FILE -->
    <script src="js/notifications.js"></script>
    <!-- 4. Core API and Auth - LOCAL FILES -->
    <script src="js/core-api.js"></script>
    <script src="js/auth-api.js"></script>
    
    <!-- Diagnostic: Check if libraries loaded -->
    <script>
        window.addEventListener('DOMContentLoaded', function() {
            console.log('=== Library Check ===');
            console.log('SweetAlert2:', typeof Swal !== 'undefined' ? '✅ Loaded' : '❌ NOT Loaded');
            console.log('Toastify:', typeof Toastify !== 'undefined' ? '✅ Loaded' : '❌ NOT Loaded');
            console.log('showSuccess:', typeof showSuccess !== 'undefined' ? '✅ Available' : '❌ NOT Available');
            console.log('showErrorToast:', typeof showErrorToast !== 'undefined' ? '✅ Available' : '❌ NOT Available');
            
            if (typeof Swal === 'undefined') {
                console.error('❌ SweetAlert2 failed to load! Check js/sweetalert2.min.js exists.');
            }
            if (typeof Toastify === 'undefined') {
                console.error('❌ Toastify failed to load! Check js/toastify.min.js exists.');
            }
        });
    </script>
    <script>
        // Rate limiting variables
        let loginAttempts = 0;
        let lastAttemptTime = 0;
        let isLockedOut = false;

        // Check rate limit for login attempts
        function checkRateLimit() {
            const now = Date.now();

            // Check if locked out
            if (isLockedOut) {
                if (now - lastAttemptTime < 300000) { // 5 minute lockout
                    return { allowed: false, message: 'Too many failed attempts. Please wait 5 minutes.' };
                }
                // Reset after 5 minutes
                loginAttempts = 0;
                isLockedOut = false;
            }

            // Check cooldown (5 seconds between attempts)
            if (now - lastAttemptTime < 5000) {
                return { allowed: false, message: 'Please wait before trying again.' };
            }

            lastAttemptTime = now;
            loginAttempts++;

            // Lock out after 5 failed attempts
            if (loginAttempts >= 5) {
                isLockedOut = true;
                return { allowed: false, message: 'Too many failed attempts. Please wait 5 minutes.' };
            }

            return { allowed: true };
        }

        // Reset login attempts on successful login
        function resetLoginAttempts() {
            loginAttempts = 0;
            isLockedOut = false;
        }

        // Enhanced showAlert using Toastify and SweetAlert2
        function showAlert(message, type = 'error') {
            // Use toast notifications for better UX
            if (type === 'success') {
                showSuccess(message);
            } else {
                showErrorToast(message);
            }
        }

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const salonId = parseInt(document.getElementById('salonId').value);
            const password = document.getElementById('password').value.trim();
            const loginBtn = document.getElementById('loginBtn');
            const loginBtnText = document.getElementById('loginBtnText');
            const loginSpinner = document.getElementById('loginSpinner');

            // Clear any existing tokens before new login attempt
            TokenManager.removeToken();
            TokenManager.removeUser();
            localStorage.removeItem('refresh_token');
            localStorage.removeItem('csrf_token');

            // Validate salon ID
            if (!salonId || salonId <= 0) {
                showAlert('Please enter a valid Salon ID');
                loginBtn.disabled = false;
                loginBtnText.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
                return;
            }

            // Password validation before API call
            if (password.length < 6) {
                showAlert('Password must be at least 6 characters');
                loginBtn.disabled = false;
                loginBtnText.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
                return;
            }

            // Check rate limit
            const rateCheck = checkRateLimit();
            if (!rateCheck.allowed) {
                showAlert(rateCheck.message);
                loginBtn.disabled = false;
                loginBtnText.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
                return;
            }

            // Disable button and show spinner
            loginBtn.disabled = true;
            loginBtnText.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Signing in...';

            try {
                // Pass salon_id to backend - required for multi-salon setup
                const result = await AuthAPI.login(email, password, 'ADMIN/STAFF', salonId);

                if (result.success) {
                    showAlert('Login successful! Redirecting...', 'success');

                    if (result.data.refresh_token) {
                        localStorage.setItem('refresh_token', result.data.refresh_token);
                    }

                    // Reset login attempts on success
                    resetLoginAttempts();

                    // Use AuthAPI.getRedirectUrl() for consistent redirect
                    setTimeout(() => {
                        window.location.href = AuthAPI.getRedirectUrl(result.user);
                    }, 1000);
                } else {
                    showAlert(result.message || 'Invalid credentials. Please try again.');
                    loginBtn.disabled = false;
                    loginBtnText.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
                }
            } catch (error) {
                showAlert('Login failed: ' + error.message);
                loginBtn.disabled = false;
                loginBtnText.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
            }
        });

        // Check if already logged in on page load
        window.addEventListener('DOMContentLoaded', function() {
            // Don't redirect if we're on the login page itself
            // This prevents redirect loop when login fails
            const user = TokenManager.getUser();

            if (user && TokenManager.isAuthenticated()) {
                // Only redirect if NOT on login page
                if (!window.location.pathname.includes('login.html')) {
                    window.location.href = AuthAPI.getRedirectUrl(user);
                }
            }
        });
    </script>
</body>
</html>
