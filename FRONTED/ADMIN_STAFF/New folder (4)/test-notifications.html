<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notification Test</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0e1a;
            color: #f1f5f9;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            align-items: center;
        }
        button {
            padding: 1rem 2rem;
            font-size: 1rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }
        .btn-success {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
        }
        .btn-error {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
        }
        .btn-warning {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white;
        }
        .btn-info {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
        }
        .status {
            padding: 1rem;
            background: #1a1f2e;
            border-radius: 8px;
            margin-top: 2rem;
            border: 1px solid #2a3142;
        }
        .status ✅ { color: #10b981; }
        .status ❌ { color: #ef4444; }
    </style>
</head>
<body>
    <h1>🎨 Notification System Test</h1>
    <p>Click buttons to test different notification types</p>
    
    <button class="btn-success" onclick="testSuccess()">✅ Test Success Toast</button>
    <button class="btn-error" onclick="testError()">❌ Test Error Toast</button>
    <button class="btn-warning" onclick="testWarning()">⚠️ Test Warning Toast</button>
    <button class="btn-info" onclick="testInfo()">ℹ️ Test Info Toast</button>
    <button onclick="testModal()">🔔 Test Success Modal</button>
    <button onclick="testErrorModal()">🚨 Test Error Modal</button>
    <button onclick="testConfirm()">❓ Test Confirmation</button>
    
    <div class="status">
        <h3>Library Status:</h3>
        <p id="sweetalert2">Checking SweetAlert2...</p>
        <p id="toastify">Checking Toastify...</p>
        <p id="notifications">Checking notifications.js...</p>
    </div>

    <!-- Load libraries -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script src="../js/notifications.js"></script>
    
    <script>
        // Check if libraries loaded
        window.addEventListener('DOMContentLoaded', function() {
            document.getElementById('sweetalert2').innerHTML = 
                typeof Swal !== 'undefined' ? '✅ SweetAlert2 Loaded' : '❌ SweetAlert2 NOT Loaded';
            document.getElementById('toastify').innerHTML = 
                typeof Toastify !== 'undefined' ? '✅ Toastify Loaded' : '❌ Toastify NOT Loaded';
            document.getElementById('notifications').innerHTML = 
                typeof showSuccess !== 'undefined' ? '✅ notifications.js Loaded' : '❌ notifications.js NOT Loaded';
        });

        // Test functions
        function testSuccess() {
            showSuccess('This is a success message!');
        }
        
        function testError() {
            showErrorToast('This is an error message!');
        }
        
        function testWarning() {
            showWarningToast('This is a warning message!');
        }
        
        function testInfo() {
            showInfoToast('This is an info message!');
        }
        
        function testModal() {
            showSuccessModal('Success!', 'Operation completed successfully!');
        }
        
        function testErrorModal() {
            showError('Error', 'Something went wrong. Please try again.');
        }
        
        async function testConfirm() {
            const result = await showConfirm('Test Confirmation', 'Do you want to proceed?');
            if (result.isConfirmed) {
                showSuccess('You confirmed!');
            } else {
                showInfo('Cancelled', 'You cancelled the action.');
            }
        }
    </script>
</body>
</html>
