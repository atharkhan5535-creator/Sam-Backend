<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Test</title>
    <link rel="stylesheet" href="css/main.css">
    <style>
        body { font-family: Arial; padding: 20px; }
        .log { background: #f0f0f0; padding: 10px; margin: 10px 0; border-radius: 5px; font-family: monospace; font-size: 12px; white-space: pre-wrap; }
        .error { background: #ffe0e0; color: #c00; }
        .success { background: #e0ffe0; color: #080; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Login Test Page</h1>
    
    <div>
        <button onclick="testLogin()">Test Login</button>
        <button onclick="clearLogs()">Clear Logs</button>
        <button onclick="checkStorage()">Check localStorage</button>
    </div>
    
    <h2>Logs:</h2>
    <div id="logs"></div>

    <script src="js/core-api.js"></script>
    <script src="js/auth-api.js"></script>
    <script>
        function log(msg, type = 'info') {
            const div = document.createElement('div');
            div.className = 'log ' + type;
            div.textContent = new Date().toLocaleTimeString() + ' - ' + msg;
            document.getElementById('logs').appendChild(div);
        }

        function clearLogs() {
            document.getElementById('logs').innerHTML = '';
        }

        function checkStorage() {
            log('localStorage keys: ' + Object.keys(localStorage).join(', '));
            log('auth_token: ' + (localStorage.getItem('auth_token') ? 'EXISTS' : 'NOT FOUND'));
            log('user: ' + localStorage.getItem('user'));
            const user = TokenManager.getUser();
            log('TokenManager.getUser(): ' + JSON.stringify(user));
        }

        async function testLogin() {
            clearLogs();
            log('Starting login test...');
            log('API_BASE_URL: ' + API_BASE_URL);
            
            try {
                log('Calling AuthAPI.login...');
                const result = await AuthAPI.login('admin@gmail.com', '123456', 'ADMIN/STAFF', 1);
                
                log('Login result: ' + JSON.stringify(result), result.success ? 'success' : 'error');
                
                if (result.success) {
                    log('SUCCESS! User: ' + JSON.stringify(result.user), 'success');
                    log('Token: ' + (result.data.token ? 'EXISTS' : 'NOT FOUND'), 'success');
                    
                    setTimeout(() => {
                        checkStorage();
                        log('Redirecting to admin/dashboard.html...', 'success');
                        window.location.href = 'admin/dashboard.html';
                    }, 2000);
                } else {
                    log('Login failed: ' + result.message, 'error');
                }
            } catch (error) {
                log('ERROR: ' + error.message, 'error');
                log('Check console for details');
            }
        }

        // Initial storage check
        checkStorage();
    </script>
</body>
</html>
