<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Notification Test</title>
    
    <!-- REQUIRED: Toastify CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #1a1a2e;
            color: white;
            padding: 40px;
            text-align: center;
        }
        button {
            margin: 10px;
            padding: 15px 30px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        .btn-success { background: #10b981; color: white; }
        .btn-error { background: #ef4444; color: white; }
        .btn-warning { background: #f59e0b; color: white; }
        .btn-info { background: #3b82f6; color: white; }
        .status {
            margin-top: 30px;
            padding: 20px;
            background: #16213e;
            border-radius: 8px;
        }
        .ok { color: #10b981; }
        .error { color: #ef4444; }
    </style>
    
    <!-- REQUIRED: Toastify CSS - LOCAL FILE -->
    <link rel="stylesheet" href="css/toastify.min.css">
</head>
<body>
    <h1>🎨 Notification Test Page</h1>
    <p>Click buttons to test notifications</p>
    
    <div>
        <button class="btn-success" onclick="testSuccess()">✅ Success</button>
        <button class="btn-error" onclick="testError()">❌ Error</button>
        <button class="btn-warning" onclick="testWarning()">⚠️ Warning</button>
        <button class="btn-info" onclick="testInfo()">ℹ️ Info</button>
    </div>
    
    <div>
        <button onclick="testModal()">🔔 Modal Success</button>
        <button onclick="testErrorModal()">🚨 Modal Error</button>
    </div>
    
    <div class="status">
        <h3>Library Status:</h3>
        <p id="swal-status">Checking SweetAlert2...</p>
        <p id="toastify-status">Checking Toastify...</p>
        <p id="functions-status">Checking functions...</p>
    </div>

    <!-- REQUIRED: Load libraries in order - LOCAL FILES -->
    <!-- 1. SweetAlert2 -->
    <script src="js/sweetalert2.min.js"></script>
    <!-- 2. Toastify JS -->
    <script src="js/toastify.min.js"></script>
    <!-- 3. Our notifications.js -->
    <script src="js/notifications.js"></script>
    
    <script>
        // Check if libraries loaded
        window.addEventListener('DOMContentLoaded', function() {
            document.getElementById('swal-status').innerHTML = 
                typeof Swal !== 'undefined' 
                    ? '<span class="ok">✅ SweetAlert2 Loaded</span>' 
                    : '<span class="error">❌ SweetAlert2 NOT Loaded - Check internet!</span>';
            
            document.getElementById('toastify-status').innerHTML = 
                typeof Toastify !== 'undefined' 
                    ? '<span class="ok">✅ Toastify Loaded</span>' 
                    : '<span class="error">❌ Toastify NOT Loaded - Check internet!</span>';
            
            document.getElementById('functions-status').innerHTML = 
                typeof showSuccess !== 'undefined' 
                    ? '<span class="ok">✅ Notification functions available</span>' 
                    : '<span class="error">❌ Functions NOT available - notifications.js not loaded!</span>';
            
            // Show a test notification on page load
            if (typeof showSuccess !== 'undefined') {
                setTimeout(() => {
                    showSuccess('Notifications are working! 🎉');
                }, 500);
            }
        });
        
        // Test functions
        function testSuccess() {
            if (typeof showSuccess === 'undefined') {
                alert('showSuccess function not available!');
                return;
            }
            showSuccess('Operation completed successfully!');
        }
        
        function testError() {
            if (typeof showErrorToast === 'undefined') {
                alert('showErrorToast function not available!');
                return;
            }
            showErrorToast('Something went wrong!');
        }
        
        function testWarning() {
            if (typeof showWarningToast === 'undefined') {
                alert('showWarningToast function not available!');
                return;
            }
            showWarningToast('Warning: Please check your input!');
        }
        
        function testInfo() {
            if (typeof showInfoToast === 'undefined') {
                alert('showInfoToast function not available!');
                return;
            }
            showInfoToast('Here is some information');
        }
        
        function testModal() {
            if (typeof Swal === 'undefined') {
                alert('SweetAlert2 not loaded!');
                return;
            }
            Swal.fire({
                icon: 'success',
                title: 'Success!',
                text: 'Modal notifications work!',
                background: '#1a1f2e',
                color: '#f1f5f9'
            });
        }
        
        function testErrorModal() {
            if (typeof Swal === 'undefined') {
                alert('SweetAlert2 not loaded!');
                return;
            }
            Swal.fire({
                icon: 'error',
                title: 'Error!',
                text: 'Error modals work!',
                background: '#1a1f2e',
                color: '#f1f5f9'
            });
        }
    </script>
</body>
</html>
