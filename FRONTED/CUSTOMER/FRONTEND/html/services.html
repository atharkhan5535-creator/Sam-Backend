<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Italiana&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&family=Poetsen+One&display=swap" rel="stylesheet">

  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" />

  <!-- Global CSS -->
   <link rel="stylesheet" href="../CSS/Base/main.css"> 
    <title>Elite Beauty Salon</title>
</head>
<body>
<header class="navbar" id="navbar">
  <!-- LOGO -->
  <a class="logo" href="../index.html">
    <span class="logo-text" id="logo-text"></span>
  </a>

  <!-- DESKTOP NAV LINKS -->
  <nav class="nav-links" aria-label="Primary navigation">
    <div class="nav-link">
      <a href="../index.html" class="nav-a">
        <i class="nav-i ri-home-4-line"></i>Home
      </a>
    </div>
    <div class="nav-link">
      <a href="./services.html" class="nav-a active-nav">
        <i class="nav-i ri-scissors-fill"></i>Services
      </a>
    </div>
    <div class="nav-link">
      <a href="./packages.html" class="nav-a">
        <i class="nav-i ri-gift-2-line"></i>Packages
      </a>
    </div>
    <div class="nav-link">
      <a href="./myAppointment.html" class="nav-a">
        <i class="nav-i ri-calendar-line"></i>Appointments
      </a>
    </div>
    <div class="nav-link">
      <a href="./contactUs.html" class="nav-a">
        <i class="nav-i ri-contacts-book-2-line"></i>Contact Us
      </a>
    </div>
  </nav>

  <!-- DESKTOP RIGHT -->
  <div class="nav-right">
    <button class="nav-btns nav-btn-log" id="nav-log-btn">
      <a class="nav-btn-a" href="../html/login.html">Log In</a>
    </button>
    <button class="nav-btns nav-btn-sign" id="nav-signup-btn">
      <a class="nav-btn-a" href="../html/signup.html">Sign Up</a>
    </button>

    <!-- Profile (shown when logged in) -->
    <div class="nav-profile-div" id="nav-profile-div">
      <div class="profile-trigger" id="profileTrigger">
        <div class="profile-avatar"><i class="ri-user-line"></i></div>
        <span class="nav-profile-name">My Profile</span>
        <i class="ri-arrow-down-s-line profile-chevron"></i>
      </div>
      <div class="hover-profile-box">
        <button class="land-edit-pro-btn">
          <a href="../html/packages.html">Edit Profile <i class="ri-edit-circle-fill"></i></a>
        </button>
        <button class="land-logout-btn" onclick="logout()">
          Log Out <i class="ri-logout-circle-r-line"></i>
        </button>
      </div>
    </div>
  </div>
</header>
  <!-- Mobile quick menu -->
<section class="mobile-menu" id="mobile-menu-full-page">
  <div class="menu-item">
    <a href="../index.html "><i class=" mobile-menu-i ri-home-4-line"></i></a>
  </div>
  <div class="menu-item active active-nav">
    <a href="../html/services.html"><i class=" mobile-menu-i ri-scissors-fill"></i></a>
  </div>
  <div class="menu-item">
    <a href="../html/packages.html"><i class=" mobile-menu-i ri-gift-2-line"></i></a>
  </div>
  <div class="menu-item">
    <a href="../html/myAppointment.html"><i class=" mobile-menu-i ri-calendar-line"></i></a>
  </div>
  <div class="menu-item">
    <a href="../html/contactUs.html"><i class=" mobile-menu-i ri-contacts-book-2-line"></i></a>
  </div>
</section>

<!-- services page -->
 <div class="servicesPage-container">
     <div class="servicesPage-left">
         <section class="services-page-top-inputs">
             <div class="servicesPage-inputs-one">
                <div class="service-cart-label">
                    <h2>our services</h2>
                    <a href="./mobileCart.html"><i class="ri-shopping-cart-2-line"></i></a>
                </div>
                 <div class="servicesPage-search-box">
                   <i class="ri-search-2-line"></i>
                   <input type="text" placeholder="search services.." id="service-search">
                 </div>
             </div>
             <div class="servicesPage-categories">
                 <button data-category= "all"   class="services-category-btn active-category">all</button>
                 <button data-category= "hair"  class="services-category-btn">hair</button>
                 <button data-category= "nails" class="services-category-btn">nails</button>
                 <button data-category= "face"  class="services-category-btn">face</button>
                 <button data-category= "skin"  class="services-category-btn">skin</button>
             </div>
         </section>
         
         <!-- Services cards -->
         <section class="services-display-section">
           <div class="servicePage-service-card-row" id="servicesContainer">
            <!-- services render here -->
           </div>
          </section>
     </div>

     <div class="servicesPage-right-cart">
       <div class="desktop-cart-preview">
            <p class="cart-overlay-text">add services to cart, to book your appointment</p>
           <div class="desktop-cart-top">
            <!-- cart services render -->
          </div>
           <div class="desktop-cart-bottom">
               <div class="cart-total-sec">
                   <h3>Total</h3>
                   <h4 class="final-total-amount">₹0</h4>
               </div>
           </div>
           <button class="select-staffDate-btn">Select Date & Time <i class="ri-arrow-right-s-line"></i></button>
       </div>
     </div>
     <!-- MOBILE CART PREVIEW BAR -->
     <div class="mobile-cart-preview" id="mobileCartPreview">
         <div class="mobile-cart-content">
             <!-- left: stacked service name chips -->
             <div class="cart-left-sec" id="mobileCartNames">
                 <!-- JS renders one <span> per added service -->
             </div>

             <!-- right: view cart btn only (total removed) -->
             <div class="cart-right-sec">
                <button class="view-cart-btn" id="viewCartBtn" onclick="openMobileCart()">
                  View Cart <i class="ri-arrow-right-s-line"></i>
                </button>
             </div>
         </div>
     </div>
 </div>


      <!-- Include SweetAlert2 JS -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../Js/Core/alert.js"></script>
 <script src="../Js/Core/config.js"></script>
 <script src="../Js/Core/CartManager.js"></script>
 <script src="../Js/pages/services.js"></script>

</body>
</html>
