<!-- ══ PAGE ══ -->
<div class="contact-page">
  <h1 class="contactUs-title">Contact Us</h1>

  <!-- Address Card -->
  <div class="address-Card">
    <div class="address-header">
       <div class="location-mark"><i class="ri-map-pin-line"></i></div>
       <div class="address-text">
         <h2 id="salon-name">Our Address</h2>
         <p id="salon-address"></p>
       </div>
    </div>
    <!-- Map -->
    <div class="map-container">
      <iframe
        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3769.3152823060777!2d72.99871531490176!3d19.153490487029547!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3be7c0e2e63f22bb%3A0xa5c6e5a0c5e5b5e5!2sShiv%20Shankar%2C%20Sector%207%2C%20Airoli%2C%20Navi%20Mumbai%2C%20Maharashtra%20400708!5e0!3m2!1sen!2sin!4v1700000000000!5m2!1sen!2sin"
        allowfullscreen=""
        loading="lazy"
        referrerpolicy="no-referrer-when-downgrade"
        title="salon location">
      </iframe>
    </div>
  </div>

  <!-- Call & Email -->
  <div class="contact-grid">
    <div class="contact-card">
      <div class="contact-cart-title">
        <i class="ri-phone-fill"></i>
        <h3>Call Us</h3>
      </div>
      <div class="contact-cart-info">
         <p id="salon-phone-display"></p>
        <a href="#" id="salon-phone-link" class="contact-btn">Call Now</a>
      </div>
    </div>

    <div class="contact-card">
      <div class="contact-cart-title">
         <i class="ri-mail-fill"></i>
         <h3>Email Us</h3>
      </div>
      <div class="contact-cart-info">
        <p id="salon-email-display"></p>
        <a href="#" id="salon-email-link" class="contact-btn">Send Email</a>
      </div>
    </div>
  </div>

  <!-- Feedback -->
  <div class="feedback-card">
    <h3>How would you rate your experience?</h3>

    <!-- Appointment selector (only shown when logged in) -->
    <select id="appointment-select" class="appointment-select" style="display:none;">
      <option value="">Select Appointment</option>
    </select>

    <div class="stars" id="stars">
      <span class="star" data-i="1"><i class="ri-star-line"></i></span>
      <span class="star" data-i="2"><i class="ri-star-line"></i></span>
      <span class="star" data-i="3"><i class="ri-star-line"></i></span>
      <span class="star" data-i="4"><i class="ri-star-line"></i></span>
      <span class="star" data-i="5"><i class="ri-star-line"></i></span>
    </div>

    <textarea class="comment-box" id="feedback-comment" placeholder="Write your comments…" maxlength="500"></textarea>
    <div class="feedback-actions">
      <label class="anonymous-checkbox">
        <input type="checkbox" id="feedback-anonymous">
        <span>Submit anonymously</span>
      </label>
      <button class="submit-btn" id="submit-feedback-btn">Submit Feedback</button>
    </div>
  </div>
</div>
