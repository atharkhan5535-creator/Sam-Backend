<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth System Test</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 900px;
            margin: 2rem auto;
            padding: 2rem;
            background: #1a1a2e;
            color: #eee;
        }
        h1 {
            color: #d4af37;
            border-bottom: 2px solid #d4af37;
            padding-bottom: 0.5rem;
        }
        .test-section {
            background: #16213e;
            border: 1px solid #0f3460;
            border-radius: 8px;
            padding: 1.5rem;
            margin: 1.5rem 0;
        }
        .test-section h2 {
            color: #d4af37;
            margin-top: 0;
        }
        .test-result {
            padding: 1rem;
            margin: 0.5rem 0;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
        }
        .success {
            background: rgba(16, 185, 129, 0.2);
            border: 1px solid #10b981;
            color: #10b981;
        }
        .error {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid #ef4444;
            color: #ef4444;
        }
        .info {
            background: rgba(59, 130, 246, 0.2);
            border: 1px solid #3b82f6;
            color: #3b82f6;
        }
        button {
            background: linear-gradient(135deg, #d4af37 0%, #cd7f32 100%);
            color: #1a1a2e;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            margin: 0.5rem;
            transition: transform 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        pre {
            background: #0f0f23;
            padding: 1rem;
            border-radius: 4px;
            overflow-x: auto;
            font-size: 0.85rem;
            max-height: 300px;
            overflow-y: auto;
        }
        .form-group {
            margin: 1rem 0;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #94a3b8;
        }
        input {
            width: 100%;
            padding: 0.75rem;
            background: #0f0f23;
            border: 1px solid #2a3142;
            border-radius: 4px;
            color: #eee;
            font-size: 1rem;
        }
        input:focus {
            outline: none;
            border-color: #d4af37;
        }
    </style>
</head>
<body>
    <h1>🔐 SAM Backend Auth System Test</h1>
    
    <div class="test-section">
        <h2>1. Backend Connection Test</h2>
        <button onclick="testBackendConnection()">Test Backend API</button>
        <div id="connection-result"></div>
    </div>

    <div class="test-section">
        <h2>2. Login Test</h2>
        <div class="form-group">
            <label for="testEmail">Email:</label>
            <input type="email" id="testEmail" value="admin@elite.com">
        </div>
        <div class="form-group">
            <label for="testPassword">Password:</label>
            <input type="password" id="testPassword" value="password">
        </div>
        <div class="form-group">
            <label for="testSalonId">Salon ID:</label>
            <input type="number" id="testSalonId" value="1">
        </div>
        <button onclick="testLogin()">Test Login</button>
        <div id="login-result"></div>
    </div>

    <div class="test-section">
        <h2>3. Authenticated API Test</h2>
        <button onclick="testDashboardAPI()" id="btnDashboard" disabled>Test Dashboard API</button>
        <button onclick="testServicesAPI()" id="btnServices" disabled>Test Services API</button>
        <button onclick="testIncentivesAPI()" id="btnIncentives" disabled>Test Incentives API</button>
        <div id="auth-api-result"></div>
    </div>

    <div class="test-section">
        <h2>4. Token Info</h2>
        <button onclick="displayTokenInfo()">Display Token Info</button>
        <button onclick="clearTokens()">Clear Tokens</button>
        <div id="token-info"></div>
    </div>

    <script>
        const API_BASE_URL = window.location.origin + '/Sam-Backend/BACKEND/public/index.php/api';
        
        let authToken = null;
        let userInfo = null;

        async function apiRequest(endpoint, options = {}) {
            const url = `${API_BASE_URL}${endpoint}`;
            const defaultHeaders = {
                'Content-Type': 'application/json',
                'Accept': 'application/json'
            };
            
            if (authToken) {
                defaultHeaders['Authorization'] = `Bearer ${authToken}`;
            }

            const config = {
                ...options,
                headers: {
                    ...defaultHeaders,
                    ...options.headers
                }
            };

            try {
                const response = await fetch(url, config);
                const contentType = response.headers.get('content-type');
                
                // Check if response is JSON
                if (contentType && contentType.includes('application/json')) {
                    const data = await response.json();
                    return {
                        ok: response.ok,
                        status: response.status,
                        data: data,
                        contentType: 'json'
                    };
                } else {
                    // Response is HTML or other format
                    const text = await response.text();
                    return {
                        ok: response.ok,
                        status: response.status,
                        data: text,
                        contentType: 'html'
                    };
                }
            } catch (error) {
                return {
                    ok: false,
                    status: 0,
                    data: error.message,
                    contentType: 'error'
                };
            }
        }

        function showResult(elementId, message, type) {
            const el = document.getElementById(elementId);
            el.innerHTML = `<div class="test-result ${type}">${message}</div>`;
        }

        function appendResult(elementId, message, type) {
            const el = document.getElementById(elementId);
            el.innerHTML += `<div class="test-result ${type}">${message}</div>`;
        }

        async function testBackendConnection() {
            showResult('connection-result', 'Testing backend connection...', 'info');
            
            const result = await apiRequest('/auth/login', {
                method: 'OPTIONS'
            });
            
            if (result.status === 200 || result.status === 0) {
                showResult('connection-result', 
                    `✅ Backend is reachable<br>URL: ${API_BASE_URL}<br>CORS: Enabled`, 
                    'success');
            } else {
                showResult('connection-result', 
                    `❌ Backend connection failed<br>Status: ${result.status}<br>Response: ${JSON.stringify(result.data)}`, 
                    'error');
            }
        }

        async function testLogin() {
            const email = document.getElementById('testEmail').value;
            const password = document.getElementById('testPassword').value;
            const salonId = document.getElementById('testSalonId').value;

            showResult('login-result', 'Attempting login...', 'info');

            const result = await apiRequest('/auth/login', {
                method: 'POST',
                body: JSON.stringify({
                    email: email,
                    password: password,
                    login_type: 'ADMIN/STAFF',
                    salon_id: parseInt(salonId)
                })
            });

            if (result.contentType !== 'json') {
                showResult('login-result', 
                    `❌ ERROR: Received HTML instead of JSON!<br>Content-Type: ${result.contentType}<br>Status: ${result.status}<br>Response: ${result.contentType === 'html' ? result.data.substring(0, 500) : JSON.stringify(result.data)}`, 
                    'error');
                return;
            }

            if (result.ok && result.data.status === 'success') {
                authToken = result.data.data.access_token;
                localStorage.setItem('auth_token', authToken);
                localStorage.setItem('refresh_token', result.data.data.refresh_token);
                
                // Decode token to get user info
                const parts = authToken.split('.');
                const payload = JSON.parse(atob(parts[1]));
                userInfo = {
                    user_id: payload.user_id,
                    role: payload.role,
                    salon_id: payload.salon_id
                };
                localStorage.setItem('user', JSON.stringify(userInfo));

                showResult('login-result', 
                    `✅ Login successful!<br>Access Token: ${authToken.substring(0, 50)}...<br>Refresh Token: ${result.data.data.refresh_token.substring(0, 50)}...<br>User: ${JSON.stringify(userInfo)}`, 
                    'success');
                
                // Enable authenticated API tests
                document.getElementById('btnDashboard').disabled = false;
                document.getElementById('btnServices').disabled = false;
                document.getElementById('btnIncentives').disabled = false;
            } else {
                showResult('login-result', 
                    `❌ Login failed<br>Status: ${result.status}<br>Response: ${JSON.stringify(result.data)}`, 
                    'error');
            }
        }

        async function testDashboardAPI() {
            if (!authToken) {
                appendResult('auth-api-result', '❌ No auth token. Login first.', 'error');
                return;
            }

            appendResult('auth-api-result', 'Testing Dashboard API...', 'info');

            const result = await apiRequest('/dashboard/stats?period=month');
            
            if (result.contentType !== 'json') {
                appendResult('auth-api-result', 
                    `❌ ERROR: Received HTML instead of JSON!<br>Content-Type: ${result.contentType}<br>Response: ${result.data.substring(0, 500)}`, 
                    'error');
                return;
            }

            if (result.ok && result.data.status === 'success') {
                appendResult('auth-api-result', 
                    `✅ Dashboard API works!<br>Data: <pre>${JSON.stringify(result.data.data, null, 2)}</pre>`, 
                    'success');
            } else {
                appendResult('auth-api-result', 
                    `❌ Dashboard API failed<br>Status: ${result.status}<br>Response: ${JSON.stringify(result.data)}`, 
                    'error');
            }
        }

        async function testServicesAPI() {
            if (!authToken) {
                appendResult('auth-api-result', '❌ No auth token. Login first.', 'error');
                return;
            }

            appendResult('auth-api-result', 'Testing Services API...', 'info');

            const result = await apiRequest('/admin/services/list');
            
            if (result.contentType !== 'json') {
                appendResult('auth-api-result', 
                    `❌ ERROR: Received HTML instead of JSON!<br>Content-Type: ${result.contentType}<br>Response: ${result.data.substring(0, 500)}`, 
                    'error');
                return;
            }

            if (result.ok && result.data.status === 'success') {
                appendResult('auth-api-result', 
                    `✅ Services API works!<br>Count: ${result.data.data.items?.length || 0} services`, 
                    'success');
            } else {
                appendResult('auth-api-result', 
                    `❌ Services API failed<br>Status: ${result.status}<br>Response: ${JSON.stringify(result.data)}`, 
                    'error');
            }
        }

        async function testIncentivesAPI() {
            if (!authToken) {
                appendResult('auth-api-result', '❌ No auth token. Login first.', 'error');
                return;
            }

            appendResult('auth-api-result', 'Testing Incentives API...', 'info');

            const result = await apiRequest('/incentives/monthly?month=' + new Date().toISOString().slice(0, 7));
            
            if (result.contentType !== 'json') {
                appendResult('auth-api-result', 
                    `❌ ERROR: Received HTML instead of JSON!<br>Content-Type: ${result.contentType}<br>Response: ${result.data.substring(0, 500)}`, 
                    'error');
                return;
            }

            if (result.ok && result.data.status === 'success') {
                appendResult('auth-api-result', 
                    `✅ Incentives API works!<br>Data: <pre>${JSON.stringify(result.data.data, null, 2)}</pre>`, 
                    'success');
            } else {
                appendResult('auth-api-result', 
                    `❌ Incentives API failed<br>Status: ${result.status}<br>Response: ${JSON.stringify(result.data)}`, 
                    'error');
            }
        }

        function displayTokenInfo() {
            const token = localStorage.getItem('auth_token');
            const user = localStorage.getItem('user');
            const refreshToken = localStorage.getItem('refresh_token');

            let info = '<div class="test-result info">';
            info += '<strong>Stored Tokens:</strong><br>';
            info += `Access Token: ${token ? token.substring(0, 50) + '...' : 'Not found'}<br>`;
            info += `Refresh Token: ${refreshToken ? refreshToken.substring(0, 50) + '...' : 'Not found'}<br>`;
            info += `User: ${user || 'Not found'}<br>`;
            
            if (token) {
                try {
                    const parts = token.split('.');
                    const payload = JSON.parse(atob(parts[1]));
                    info += '<br><strong>JWT Payload:</strong><br>';
                    info += `<pre>${JSON.stringify(payload, null, 2)}</pre>`;
                    
                    const expDate = new Date(payload.exp * 1000);
                    const now = new Date();
                    const isExpired = expDate < now;
                    info += `<br>Expires: ${expDate.toLocaleString()} ${isExpired ? '(EXPIRED)' : '(Valid)'}`;
                } catch (e) {
                    info += `<br>Error decoding token: ${e.message}`;
                }
            }
            
            info += '</div>';
            document.getElementById('token-info').innerHTML = info;
        }

        function clearTokens() {
            localStorage.removeItem('auth_token');
            localStorage.removeItem('refresh_token');
            localStorage.removeItem('user');
            authToken = null;
            userInfo = null;
            
            document.getElementById('token-info').innerHTML = '<div class="test-result success">✅ Tokens cleared</div>';
            document.getElementById('auth-api-result').innerHTML = '';
            
            document.getElementById('btnDashboard').disabled = true;
            document.getElementById('btnServices').disabled = true;
            document.getElementById('btnIncentives').disabled = true;
        }

        // Auto-load token on page load
        window.addEventListener('DOMContentLoaded', () => {
            authToken = localStorage.getItem('auth_token');
            if (authToken) {
                try {
                    const parts = authToken.split('.');
                    const payload = JSON.parse(atob(parts[1]));
                    userInfo = {
                        user_id: payload.user_id,
                        role: payload.role,
                        salon_id: payload.salon_id
                    };
                    
                    // Check if expired
                    const expDate = new Date(payload.exp * 1000);
                    if (expDate > new Date()) {
                        document.getElementById('btnDashboard').disabled = false;
                        document.getElementById('btnServices').disabled = false;
                        document.getElementById('btnIncentives').disabled = false;
                        appendResult('auth-api-result', 'ℹ️ Found valid token from previous session', 'info');
                    }
                } catch (e) {
                    console.error('Token decode error:', e);
                }
            }
        });
    </script>
</body>
</html>
